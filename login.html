<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 / 註冊 - 台灣政府採購 AI 分析系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft JhengHei', sans-serif;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1; border: none; background: #f0f0f0;
            padding: 10px; font-size: 15px; cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:first-child { border-radius: 10px 0 0 10px; }
        .tab-btn:last-child  { border-radius: 0 10px 10px 0; }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-weight: 600;
        }
        .btn-primary-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; color: white; width: 100%;
            padding: 12px; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary-gradient:hover { opacity: 0.9; }
        .btn-primary-gradient:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .divider { text-align: center; position: relative; margin: 20px 0; }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%; width: 45%;
            height: 1px; background: #dee2e6;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }
        .alert-box { border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: none; }
        .alert-error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .free-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; border-radius: 20px; padding: 4px 14px;
            font-size: 13px; font-weight: 600;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-search-dollar"></i></div>
        <h2 style="font-size:20px; font-weight:700; color:#1a1a2e; margin:0">台灣政府採購 AI 分析</h2>
        <p style="color:#64748b; font-size:14px; margin-top:6px">
            登入後立即獲得 <span class="free-badge">3 次免費分析</span>
        </p>
    </div>

    <!-- Tab 切換 -->
    <div style="display:flex; margin-bottom:24px;">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登入</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">註冊</button>
    </div>

    <!-- 訊息框 -->
    <div class="alert-box alert-error"   id="alertError"></div>
    <div class="alert-box alert-success" id="alertSuccess"></div>

    <!-- 登入表單 -->
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label class="form-label" style="font-weight:600">Email</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-weight:600">密碼</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="輸入密碼" required>
        </div>
        <div style="text-align:right; margin-bottom:16px;">
            <a href="#" onclick="handleForgotPassword()" style="color:#667eea; font-size:14px;">忘記密碼？</a>
        </div>
        <button type="submit" class="btn-primary-gradient" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>登入
        </button>
    </form>

    <!-- 註冊表單 -->
    <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
        <div class="mb-3">
            <label class="form-label" style="font-weight:600">Email</label>
            <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-weight:600">密碼 <small style="color:#94a3b8;">（至少 8 字元）</small></label>
            <input type="password" class="form-control" id="regPassword" placeholder="設定密碼" minlength="8" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-weight:600">確認密碼</label>
            <input type="password" class="form-control" id="regPasswordConfirm" placeholder="再次輸入密碼" required>
        </div>
        <button type="submit" class="btn-primary-gradient" id="registerBtn">
            <i class="fas fa-user-plus me-2"></i>免費註冊
        </button>
        <p style="text-align:center; color:#64748b; font-size:13px; margin-top:14px;">
            註冊即同意服務條款，<br>並自動獲得 3 次免費 AI 分析點數
        </p>
    </form>

    <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:#94a3b8; font-size:14px;">
            <i class="fas fa-arrow-left me-1"></i>返回搜尋
        </a>
    </div>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    // ── 從全域 config 或直接填入 ──
    // 部署後請在 Vercel 環境變數設定，並在此引入 /config.js 取得
    // 暫時用 localStorage 儲存（從 pricing.html 初始化後帶入）
    const SUPABASE_URL = window.SUPABASE_URL || localStorage.getItem('sb_url') || '';
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || localStorage.getItem('sb_anon') || '';

    let supabaseClient = null;
    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function getSupabase() {
        if (!supabaseClient) {
            showError('Supabase 尚未設定，請聯絡管理員');
            return null;
        }
        return supabaseClient;
    }

    // 已登入則跳轉
    (async () => {
        const sb = getSupabase();
        if (!sb) return;
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
            location.href = redirect;
        }
    })();

    function switchTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('tabLogin').classList.toggle('active', isLogin);
        document.getElementById('tabRegister').classList.toggle('active', !isLogin);
        document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
        document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
        clearMessages();
    }

    function showError(msg) {
        const el = document.getElementById('alertError');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('alertSuccess').style.display = 'none';
    }
    function showSuccess(msg) {
        const el = document.getElementById('alertSuccess');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('alertError').style.display = 'none';
    }
    function clearMessages() {
        document.getElementById('alertError').style.display = 'none';
        document.getElementById('alertSuccess').style.display = 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const sb = getSupabase(); if (!sb) return;
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>登入中...';
        clearMessages();

        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
            showError(error.message === 'Invalid login credentials'
                ? 'Email 或密碼錯誤' : error.message);
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>登入';
            return;
        }

        // 儲存 session 並跳轉
        const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
        location.href = redirect;
    }

    async function handleRegister(e) {
        e.preventDefault();
        const sb = getSupabase(); if (!sb) return;
        clearMessages();

        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm  = document.getElementById('regPasswordConfirm').value;

        if (password !== confirm) { showError('兩次密碼不一致'); return; }
        if (password.length < 8)  { showError('密碼至少需要 8 個字元'); return; }

        const btn = document.getElementById('registerBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>註冊中...';

        const { data, error } = await sb.auth.signUp({ email, password });

        if (error) {
            showError(error.message);
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>免費註冊';
            return;
        }

        if (data.user && !data.session) {
            // 需要 Email 驗證
            showSuccess('註冊成功！請檢查您的 Email 並點擊驗證連結後再登入。');
        } else {
            showSuccess('註冊成功！已自動獲得 3 次免費點數，正在跳轉...');
            setTimeout(() => { location.href = 'index.html'; }, 1500);
        }
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>免費註冊';
    }

    async function handleForgotPassword() {
        const sb = getSupabase(); if (!sb) return;
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) { showError('請先輸入 Email 再點擊忘記密碼'); return; }

        const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: location.origin + '/login.html'
        });

        if (error) { showError(error.message); return; }
        showSuccess('密碼重設信已寄出，請檢查您的 Email');
    }
</script>
</body>
</html>
